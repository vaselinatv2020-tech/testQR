<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Scanner</title>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

<style>

html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

/* ===== TITLE ===== */
h1 {
    position: absolute;
    top: 18px;
    width: 100%;
    text-align: center;
    color: white;
    font-weight: 400;
    z-index: 10;
    font-size: 18px;
    opacity: 0.85;
}

/* ===== BUTTON ===== */
#startBtn {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    padding: 14px 26px;
    font-size: 16px;
    border: none;
    border-radius: 14px;
    background: #1e88e5;
    color: white;
    z-index: 10;
    box-shadow: 0 8px 20px rgba(30,136,229,0.4);
}

/* ===== CAMERA ===== */
#video {
    width: 100vw;
    height: 100vh;
    object-fit: cover;
}

/* ===== OVERLAY ===== */
#overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
}

/* затемнення */
#overlay::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.60);
}

/* скан-бокс */
.scan-box {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 260px;
    height: 260px;
    transform: translate(-50%, -50%);
    border: 2px solid rgba(255,255,255,0.35);
    border-radius: 18px;
    box-shadow: 0 0 25px rgba(30,136,229,0.25);
    overflow: hidden;
}

/* кутові рамки */
.scan-box::before,
.scan-box::after {
    content: "";
    position: absolute;
    width: 40px;
    height: 40px;
    border: 3px solid #1e88e5;
}

.scan-box::before {
    top: -2px;
    left: -2px;
    border-right: none;
    border-bottom: none;
}

.scan-box::after {
    bottom: -2px;
    right: -2px;
    border-left: none;
    border-top: none;
}

/* лінія сканування */
.scan-line {
    position: absolute;
    width: 100%;
    height: 2px;
    background: #1e88e5;
    animation: scan 2s infinite;
    opacity: 0.9;
}

@keyframes scan {
    0% { top: 0; }
    50% { top: 100%; }
    100% { top: 0; }
}

/* ===== PLAYER ===== */
#player {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: black;
    object-fit: cover;
}

canvas {
    display: none;
}

</style>
</head>

<body>

<h1>QR Scanner</h1>

<button id="startBtn">Почати сканування</button>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="overlay">
    <div class="scan-box">
        <div class="scan-line"></div>
    </div>
</div>

<script>

const btn = document.getElementById("startBtn");
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d", {
    willReadFrequently: true
});

let stream = null;
let scanning = false;

btn.onclick = async () => {

    btn.style.display = "none";

    stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" }
    });

    video.srcObject = stream;
    await video.play();

    scanning = true;
    requestAnimationFrame(scan);
};

function scan() {

    if (!scanning) return;

    if (video.readyState === video.HAVE_ENOUGH_DATA) {

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        ctx.drawImage(video, 0, 0);

        const image = ctx.getImageData(0, 0, canvas.width, canvas.height);

        const code = jsQR(image.data, image.width, image.height);

        if (code && code.data.endsWith(".mp4")) {
            openVideo(code.data);
            return;
        }
    }

    requestAnimationFrame(scan);
}

function stopCamera() {
    scanning = false;
    if (stream) stream.getTracks().forEach(t => t.stop());
}

function openVideo(url) {

    stopCamera();

    document.body.innerHTML = `
        <video id="player" autoplay controls playsinline></video>
    `;

    const player = document.getElementById("player");
    player.src = url;

    player.play().catch(()=>{});

    player.onended = () => location.reload();
}

</script>

</body>
</html>
